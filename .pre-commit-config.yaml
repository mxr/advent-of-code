repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-comma]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/asottile/reorder-python-imports
  rev: 7885866bd38c852b5e042c4aeef0285d715ffeee  # frozen: v3.16.0
  hooks:
  - id: reorder-python-imports
    args: [--py313-plus, --add-import, from __future__ import annotations]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
  - id: mypy
    language_version: python3.14
    additional_dependencies:
    - dijkstar
    - setuptools
- repo: https://github.com/mxr/mirrors-ty
  rev: 009c8adeffbab5aa73005612dd5a7fd9b825eee5  # frozen: v0.0.55
  hooks:
  - id: ty
    additional_dependencies:
    - dijkstar
    - setuptools
- repo: https://github.com/mxr/sync-typing-deps
  rev: v0.5.2
  hooks:
  - id: sync-typing-deps
